name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Build with Gradle
      run: |
        # Find where build.gradle.kts exists and compile
        BUILD_FILE=$(find . -name "build.gradle*" -print -quit)
        if [ -z "$BUILD_FILE" ]; then
          echo "Error: Android project not found!"
          exit 1
        fi
        
        SUB_DIR=$(dirname "$BUILD_FILE")
        echo "Found project in directory: $SUB_DIR"
        cd "$SUB_DIR"
        
        # Generate temporary debug keystore for compilation
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        # Run standard check and compile task
        gradle build -x test

    - name: Run Local Unit Tests
      run: |
        BUILD_FILE=$(find . -name "build.gradle*" -print -quit)
        SUB_DIR=$(dirname "$BUILD_FILE")
        cd "$SUB_DIR"
        gradle test
